<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sheet-Tee Golf</title>
  
  <script src="config.js"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a4a2e; font-family: Georgia, serif; color: #f0ead6; overflow-x: hidden; }
    .btn-gold { background: #d4af37; color: #1a4a2e; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; transition: opacity 0.2s; }
    .btn-gold:active { opacity: 0.8; }
    .input-field { background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; padding: 12px; color: #f0ead6; width: 100%; max-width: 300px; text-align: center; margin-bottom: 12px; outline: none; font-size: 16px; }
    .nav-btn { flex: 1; padding: 12px 5px; background: none; border: none; color: rgba(240,234,214,0.4); font-size: 11px; letter-spacing: 1px; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; }
    .nav-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { createClient } = supabase;

    // Use keys from config.js
    const sb = createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

    function LoginScreen({ onUnlock }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState(false);
      const handleEntry = () => {
        if (val.toLowerCase() === CONFIG.groupPassword.toLowerCase()) {
          localStorage.setItem("sheet-tee-auth", "true");
          onUnlock();
        } else { setErr(true); }
      };
      return (
        <div style={{height:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20, textAlign:'center'}}>
          <img src={CONFIG.logoUrl} style={{width:100, height:100, objectFit:'contain', marginBottom:20}} />
          <h1 style={{color:'#f0ead6', fontSize:24, marginBottom:8}}>{CONFIG.clubName}</h1>
          <p style={{color:'#d4af37', fontSize:12, marginBottom:24, letterSpacing:2}}>{CONFIG.tagline}</p>
          <input type="password" className="input-field" placeholder="Entry Password" onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleEntry()}/>
          {err && <p style={{color:'#ff6b6b', fontSize:12, marginBottom:10}}>Incorrect Password</p>}
          <button className="btn-gold" onClick={handleEntry}>Unlock Clubhouse</button>
        </div>
      );
    }

    function App() {
      const [isAuth, setIsAuth] = useState(!!localStorage.getItem("sheet-tee-auth"));
      const [view, setView] = useState("signup");
      const [deferredPrompt, setDeferredPrompt] = useState(null);

      useEffect(() => {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        });
      }, []);

      const triggerInstall = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          setDeferredPrompt(null);
        } else {
          const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
          alert(isIOS ? "Tap 'Share' then 'Add to Home Screen'" : "Tap Menu then 'Install App'");
        }
      };

      if (!isAuth) return <LoginScreen onUnlock={() => setIsAuth(true)} />;

      return (
        <div style={{maxWidth:600, margin:'0 auto', minHeight:'100vh', display:'flex', flexDirection:'column', background:'rgba(0,0,0,0.1)'}}>
          <header style={{textAlign:'center', padding:24, borderBottom:'2px solid #d4af37', background:'linear-gradient(180deg,#122d1a,#1e4a2a)'}}>
            <img src={CONFIG.logoUrl} style={{width:80, height:80, objectFit:'contain'}} />
            <h2 style={{marginTop:10, fontSize:22}}>{CONFIG.clubName}</h2>
            <div style={{height:1, width:60, background:'#d4af37', margin:'10px auto'}}></div>
          </header>

          <nav style={{display:'flex', background:'rgba(0,0,0,0.3)'}}>
            <button className={`nav-btn ${view==='signup'?'active':''}`} onClick={()=>setView('signup')}>Sign Up</button>
            <button className={`nav-btn ${view==='tally'?'active':''}`} onClick={()=>setView('tally')}>Who's In</button>
            <button className={`nav-btn ${view==='pics'?'active':''}`} onClick={()=>setView('pics')}>Pics</button>
            {CONFIG.enablePlayaClub && <button className={`nav-btn ${view==='playa'?'active':''}`} onClick={()=>setView('playa')}>Playa</button>}
          </nav>

          <main style={{flex:1, padding:16}}>
            {view === 'signup' && (
              <section>
                <h3 style={{color:'#d4af37', fontSize:11, letterSpacing:2, marginBottom:15, textTransform:'uppercase'}}>Weekend Signup</h3>
                <div style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)', borderRadius:8, padding:16, textAlign:'center'}}>
                   <p style={{fontSize:14, color:'rgba(240,234,214,0.6)'}}>Welcome to {CONFIG.clubName}.</p>
                   <p style={{fontSize:12, marginTop:8, opacity:0.4}}>Roster setup by Sheet-Tee.</p>
                </div>
              </section>
            )}

            {view === 'pics' && (
              <section>
                <h3 style={{color:'#d4af37', fontSize:11, letterSpacing:2, marginBottom:15, textTransform:'uppercase'}}>{CONFIG.customGalleryName}</h3>
                <div style={{textAlign:'center', padding:40, color:'rgba(240,234,214,0.3)'}}>
                  <p>Gallery is ready for uploads.</p>
                </div>
              </section>
            )}
          </main>

          <button onClick={triggerInstall} style={{position:'fixed', bottom:20, right:20, background:'#d4af37', border:'none', width:50, height:50, borderRadius:'50%', fontSize:20, boxShadow:'0 4px 12px rgba(0,0,0,0.5)', cursor:'pointer'}}>📲</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
